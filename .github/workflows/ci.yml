name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: chio-claude-code-plugin

      - name: Checkout chio-bridge (workspace dependency)
        uses: actions/checkout@v4
        with:
          # Placeholder: replace owner/chio-bridge once the GitHub org is live.
          repository: owner/chio-bridge
          path: chio-bridge
          ref: main

      - name: Checkout chio-test-harness
        uses: actions/checkout@v4
        with:
          repository: owner/chio-test-harness
          path: chio-test-harness
          ref: main

      - name: Checkout arc (chio source)
        uses: actions/checkout@v4
        with:
          repository: owner/arc
          path: arc
          ref: main

      - name: Setup chio
        uses: owner/chio-ci-actions/setup-chio@v0.1.0
        with:
          mode: build
          arc-path: arc

      - name: Build chio-bridge
        working-directory: chio-bridge
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Install plugin deps
        working-directory: chio-claude-code-plugin
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: chio-claude-code-plugin
        run: bun run typecheck || echo "typecheck non-blocking in Wave 5.1"

      - name: Build plugin
        working-directory: chio-claude-code-plugin
        run: bun run build

      - name: Unit tests
        working-directory: chio-claude-code-plugin
        run: bun run test

      - name: Install hello-mcp deps (for harness)
        working-directory: chio-test-harness/hello-mcp
        run: bun install --frozen-lockfile

      - name: Smoke (best-effort; requires `claude` CLI which is host-only)
        working-directory: chio-claude-code-plugin
        run: |
          if [[ -x ./smoke.sh ]] && command -v claude >/dev/null 2>&1; then
            ./smoke.sh
          else
            echo "smoke.sh skipped: claude CLI not available in CI (expected until plugin smoke can run headless)"
          fi

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: chio-claude-code-plugin/smoke-results
          if-no-files-found: ignore
